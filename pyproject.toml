[project]
name = "icepyck"
version = "0.1.0"
description = "Add your description here"
readme = "PROMPT.md"
authors = [
    { name = "Ian Hunt-Isaak", email = "ianhuntisaak@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    "flatbuffers",
    "zstandard",
]

[dependency-groups]
dev = [
    "mypy",
    "pytest>=9.0.3",
    "ruff",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM", "TCH"]

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
# Generated flatbuffers code is untyped
exclude = ["icepyck/generated/"]
